services:
  - type: web
    name: vishguard-backend
    plan: free
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: GEMINI_API_KEYS
        sync: false   # Paste your comma-separated API keys manually in the Render dashboard
      - key: PORT
        value: 4000
