<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!--
      viewport:
        - width=device-width, initial-scale=1.0  → standard responsive sizing
        - maximum-scale=1.0, user-scalable=no    → prevents accidental zoom when
          tapping buttons rapidly on mobile (common issue with small targets)
        - viewport-fit=cover                     → fills the notch/safe-area on
          iPhone X+ so the header is not clipped
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />

    <!-- SEO -->
    <meta
      name="description"
      content="Real-time AI-powered call spam and phishing detection system. Monitors your calls and flags threats instantly."
    />

    <!-- iOS PWA: allows adding to home screen with full-screen mode -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="VishGuard" />

    <!-- Android PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#0a0a0a" />

    <title>VishGuard — Real-Time Call Threat Detector</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
